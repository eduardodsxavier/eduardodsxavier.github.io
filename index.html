<body>

<div class="card">
    <h1>Teste de Analytics 🚀</h1>
    <p>Interaja com os elementos abaixo para disparar eventos.</p>
    
    <input type="text" id="userName" placeholder="Seu nome (Identify)">
    
    <button class="btn-primary" onclick="trackIdentify()">1. Identificar Usuário</button>
    <button class="btn-secondary" onclick="trackCustomEvent()">2. Disparar Evento Customizado</button>
    <button class="btn-danger" onclick="trackPurchase()">3. Simular Conversão ($)</button>
    
    <div id="status">Aguardando interação...</div>
</div>

<script>
    const statusDiv = document.getElementById('status');

    function updateStatus(msg) {
        statusDiv.innerText = `Última ação: ${msg} (${new Date().toLocaleTimeString()})`;
        console.log(msg);
    }

    // 1. Identify: Associa o ID do PostHog a um usuário real
    function trackIdentify() {
        const name = document.getElementById('userName').value || 'Usuário Anônimo';
        posthog.identify(name, {
            email: `${name.toLowerCase()}@exemplo.com`,
            plan: 'premium'
        });
        updateStatus('Usuário Identificado');
    }

    // 2. Evento Customizado: Testar propriedades extras
    function trackCustomEvent() {
        posthog.capture('clicou_no_botao_teste', {
            cor_do_botao: 'cinza',
            origem: 'sandbox_v1'
        });
        updateStatus('Evento Customizado Capturado');
    }

    // 3. Conversão: Útil para testar funis e caminhos
    function trackPurchase() {
        posthog.capture('compra_simulada', {
            valor: 49.90,
            moeda: 'BRL'
        });
        updateStatus('Simulação de Compra Enviada');
    }
</script>

</body>
</html>
